---
autofs_mounts:
  - name: immich
    fstype: cifs
    remote: "://{{ unas_ip }}/immich"
    options: "username=immich,password={{ immich_smb_password }},uid=1000,gid=1000,file_mode=0660,dir_mode=0770,rw"
  - name: karakeep
    fstype: cifs
    remote: "://{{ unas_ip }}/karakeep"
    options: "username=karakeep,password={{ karakeep_smb_password }},uid=0,gid=0,file_mode=0644,dir_mode=0755,rw"
