---
autofs_mounts:
  - name: immich_upload
    fstype: cifs
    remote: "://{{ unas_ip }}/immich_upload"
    options: "username=immich,password={{ immich_smb_password }},uid=0,gid=0,file_mode=0660,dir_mode=0770,rw"
  - name: immich_encoded_video
    fstype: cifs
    remote: "://{{ unas_ip }}/immich_encoded_video"
    options: "username=immich,password={{ immich_smb_password }},uid=0,gid=0,file_mode=0660,dir_mode=0770,rw"
  - name: karakeep
    fstype: cifs
    remote: "://{{ unas_ip }}/karakeep"
    options: "username=karakeep,password={{ karakeep_smb_password }},uid=0,gid=0,file_mode=0644,dir_mode=0755,rw"
  - name: paperless_consume
    fstype: cifs
    remote: "://{{ unas_ip }}/paperless_consume"
    options: "username=paperless,password={{ paperless_smb_password }},uid=1000,gid=1000,file_mode=0644,dir_mode=0755,rw"
